<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>

<!-- خط Cairo من قوقل -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
<!-- أيقونات FontAwesome للصح -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* الخلفية المتدرجة للتطبيق كاملاً */
body { 
  background: linear-gradient(to bottom, #52B743 0%, #297E25 100%); 
  margin: 0; 
  padding: 20px; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  min-height: 100vh; 
  font-family: 'Cairo', sans-serif;
  direction: rtl;
}

/* تصميم الدائرة البيضاء وعلامة الصح */
.success-circle { 
  width: 90px; 
  height: 90px; 
  background-color: #ffffff; 
  border-radius: 50%; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  margin-bottom: 20px; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
} 

.success-circle i { 
  color: #297E25; 
  font-size: 45px; 
}

h2 {
  color: white;
  font-size: 22px;
  font-weight: 600;
  margin: 0 0 20px 0;
}

/* الحاوية الكبيرة للمستطيلات */
.bankak-container { 
  width: 100%; 
  max-width: 360px; 
  border: 1.5px solid rgba(255, 255, 255, 0.4); 
  border-radius: 12px; 
  overflow: hidden; 
  margin-top: 15px;
  background: transparent;
} 

/* الأسطر الداخلية */
.row { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 12px 15px; 
  border-bottom: 1.5px solid rgba(255, 255, 255, 0.4);
  font-size: 14px;
  line-height: 1.6;
  letter-spacing: 0px;
} 

/* إزالة الخط الفاصل من السطر الأخير */
.row:last-child { 
  border-bottom: none; 
} 

/* نصوص القيم والعناوين */
.label { 
  color: #ffffff; 
  font-weight: 500;
} 

.value { 
  color: #ffffff; 
  font-weight: 400;
  text-align: left;
  direction: ltr;
}

/* زر بنك */
.bankak-button { 
  background: linear-gradient(to bottom, #60c43d 0%, #3b9825 100%); 
  border: 1.5px solid #ffffff; 
  border-radius: 12px; 
  color: #ffffff; 
  box-shadow: inset 0px 1px 3px rgba(255,255,255,0.6); 
  padding: 14px 0;
  font-size: 18px;
  font-weight: 700;
  width: 170px;
  margin: 30px auto;
  display: block;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
}
</style>
</head>
<body>

<div class="success-circle">
  <i class="fa-solid fa-check"></i>
</div>

<h2>تحويلات</h2>

<div class="bankak-container">
  <div class="row">
    <span class="value">20021762155</span>
    <span class="label">رقم العملية</span>
  </div>
  
  <div class="row">
    <span class="value">28-Apr-2026 20:20:46</span>
    <span class="label">التاريخ والزمن</span>
  </div>
  
  <div class="row">
    <span class="value">0683 0172 8665 0001</span>
    <span class="label">من حساب</span>
  </div>
  
  <div class="row">
    <span class="value">0293 1168 3274 0001</span>
    <span class="label">الى حساب</span>
  </div>
  
  <div class="row">
    <span class="value">ياسر عبدالرحمن عبدالله ادريس</span>
    <span class="label">اسم المرسل اليه</span>
  </div>
  
  <div class="row">
    <span class="value">N/A</span>
    <span class="label">رقم الموبايل</span>
  </div>
  
  <div class="row">
    <span class="value">N/A</span>
    <span class="label">التعليق</span>
  </div>
  
  <div class="row">
    <span class="value">28,000.00</span>
    <span class="label">المبلغ</span>
  </div>
</div>

<button class="bankak-button">موافق</button>

</body>
</html>
