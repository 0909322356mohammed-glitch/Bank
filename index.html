<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

body {
  background: linear-gradient(180deg, #2E7D32 0%, #388E3C 100%);
  min-height: 100vh;
  color: white;
  text-align: center;
  padding: 20px 15px 80px;
}

.check {
  width: 90px;
  height: 90px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 15px auto 20px;
}

.check svg {
  width: 50px;
  height: 50px;
  stroke: #2E7D32;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

h2 {
  font-size: 1.5rem;
  margin-bottom: 25px;
  font-weight: 500;
}

.container {
  max-width: 500px;
  margin: 0 auto;
}

.box {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: 8px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  height: 48px;
}

.label {
  font-weight: 400;
  font-size: 0.95rem;
  text-align: right;
}

.value-input {
  background: transparent;
  border: none;
  color: white;
  font-size: 0.95rem;
  text-align: left;
  direction: ltr;
  width: 60%;
  outline: none;
}

.value-input::placeholder {
  color: rgba(255,255,255,0.7);
}

.btn {
  background: white;
  border: 1px solid white;
  border-radius: 8px;
  color: #2E7D32;
  padding: 10px 50px;
  font-size: 1rem;
  font-weight: 600;
  margin: 30px auto;
  display: inline-block;
  cursor: pointer;
}

.btn:active {
  transform: scale(0.96);
}

.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.15);
  border-top: 1px solid rgba(255,255,255,0.4);
}

.footer-top {
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  font-size: 0.85rem;
  border-bottom: 1px solid rgba(255,255,255,0.4);
}

.footer-bottom {
  padding: 8px 0;
  font-size: 0.75rem;
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="container">
  <div class="check">
    <svg viewBox="0 0 24 24">
      <path d="M5 12l5 5L20 7"></path>
    </svg>
  </div>
  
  <h2>تحويلات</h2>
  
  <div class="box">
    <input type="text" class="value-input" placeholder="اكتب هنا">
    <span class="label">رقم العملية</span>
  </div>
  
  <div class="box">
    <input type="text" class="value-input" placeholder="اكتب هنا">
    <span class="label">التاريخ و الزمن</span>
  </div>
  
  <div class="box">
    <input type="text" class="value-input" placeholder="اكتب هنا">
    <span class="label">من حساب</span>
  </div>
  
  <div class="box">
    <input type="text" class="value-input" placeholder="اكتب هنا">
    <span class="label">الى حساب</span>
  </div>
  
  <div class="box">
    <input type="text" class="value-input" placeholder="اكتب هنا">
    <span class="label">إسم المرسل اليه</span>
  </div>
  
  <div class="box">
    <input type="text" class="value-input" placeholder="اكتب هنا">
    <span class="label">رقم الموبايل</span>
  </div>
  
  <div class="box">
    <input type="text" class="value-input" placeholder="اكتب هنا">
    <span class="label">التعليق</span>
  </div>
  
  <div class="box">
    <input type="text" class="value-input" placeholder="اكتب هنا">
    <span class="label">المبلغ</span>
  </div>
  
  <div class="btn">موافق</div>
</div>

<div class="footer">
  <div class="footer-top">
    <div>مشاركة</div>
    <div>طباعة</div>
    <div>تحميل</div>
  </div>
  <div class="footer-bottom">
    © 2024 بنك الخرطوم/بنكك حساب
  </div>
</div>
</body>
</html>
