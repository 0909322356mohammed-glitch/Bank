<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Cairo', Arial, sans-serif;
}

body {
  background: linear-gradient(to bottom, #8BC34A 0%, #689F38 100%);
  min-height: 100vh;
  color: white;
  padding-bottom: 100px;
}

.container {
  max-width: 400px;
  margin: 0 auto;
  padding: 0 15px;
}

/* علامة الصح */
.check-circle {
  width: 105px;
  height: 105px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 25px auto 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.check-circle svg {
  width: 65px;
  height: 65px;
  stroke: #4CAF50;
  stroke-width: 5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

h2 {
  font-size: 24px;
  margin-bottom: 22px;
  font-weight: 600;
  text-align: center;
}

/* كل الصناديق بما فيها المبلغ */
.row {
  background: rgba(255,255,255,0.28);
  border: 2px solid rgba(255,255,255,0.95);
  border-radius: 6px;
  margin-bottom: 6px;
  display: flex;
  flex-direction: row-reverse;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
  height: 48px;
}

.row input {
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  text-align: left;
  direction: ltr;
  width: 58%;
  outline: none;
}

.label {
  font-size: 16px;
  font-weight: 500;
}

/* زر موافق */
.btn-ok {
  background: linear-gradient(to bottom, #AED581 0%, #81C784 100%);
  border: 3px solid white;
  border-radius: 10px;
  color: #2E7D32;
  padding: 12px 0;
  font-size: 20px;
  font-weight: 700;
  width: 170px;
  margin: 35px auto;
  display: block;
  cursor: pointer;
  box-shadow: 0 3px 8px rgba(0,0,0,0.25);
}

/* الفوتر العلوي */
.top-icons {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px 0;
}

.top-icons div {
  text-align: center;
  font-size: 12px;
}

.icon-circle {
  border: 2px solid white;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  line-height: 28px;
  margin: 0 auto 4px;
  font-size: 14px;
  font-weight: 700;
}

/* الفوتر السفلي */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #556B2F;
}

.footer-menu {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 12px 0;
  font-size: 15px;
  border-top: 2px solid rgba(255,255,255,0.7);
  border-bottom: 2px solid rgba(255,255,255,0.7);
}

.footer-menu span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.footer-copy {
  padding: 8px 0;
  font-size: 13px;
  text-align: center;
  opacity: 0.95;
}
</style>
</head>
<body>

<div class="top-icons">
  <div>
    <div>👤+</div>
    <div>إضافة</div>
  </div>
  <div>
    <div class="icon-circle">SDG</div>
    <div>تحويل</div>
  </div>
</div>

<div class="container">
  <div class="check-circle">
    <svg viewBox="0 0 24 24">
      <path d="M5 12l5 5L20 7"></path>
    </svg>
  </div>

  <h2>تحويلات</h2>

  <div class="row">
    <span class="label">رقم العملية</span>
    <input type="text" value="20004937897" readonly>
  </div>

  <div class="row">
    <span class="label">التاريخ و الزمن</span>
    <input type="text" value="11-Aug-2024 17:29:28" readonly>
  </div>

  <div class="row">
    <span class="label">من حساب</span>
    <input type="text" value="0683 0172 8665 0001" readonly>
  </div>

  <div class="row">
    <span class="label">الى حساب</span>
    <input type="text" value="0293 1168 3274 0001" readonly>
  </div>

  <div class="row">
    <span class="label">اسم المرسل اليه</span>
    <input type="text" value="ياسر عبدالرحمن عبدالله ادريس" readonly>
  </div>

  <div class="row">
    <span class="label">رقم الموبايل</span>
    <input type="text" value="N/A" readonly>
  </div>

  <div class="row">
    <span class="label">التعليق</span>
    <input type="text" value="N/A" readonly>
  </div>

  <div class="row">
    <span class="label">المبلغ</span>
    <input type="text" value="28,000.00" readonly>
  </div>

  <button class="btn-ok">موافق</button>
</div>

<div class="footer">
  <div class="footer-menu">
    <span>🔗 مشاركة</span>
    <span>🖨️ طباعة</span>
    <span>⬇️ تحميل</span>
  </div>
  <div class="footer-copy">
    © 2024 بنك الخرطوم/بنكك حساب
  </div>
</div>

</body>
</html>
