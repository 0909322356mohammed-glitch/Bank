<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(to bottom, #7ED321 0%, #5CB85C 100%);
  min-height: 100vh;
  color: white;
  padding: 20px 0 100px;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 15px;
}

.check {
  width: 95px;
  height: 95px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 15px auto 18px;
}

.check svg {
  width: 55px;
  height: 55px;
  stroke: #3CB371;
  stroke-width: 4;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

h2 {
  font-size: 1.4rem;
  margin-bottom: 18px;
  font-weight: 500;
  text-align: center;
}

.box {
  background: rgba(255,255,255,0.22);
  border: 1.5px solid rgba(255,255,255,0.95);
  border-radius: 8px;
  margin-bottom: 5px;
  display: flex;
  flex-direction: row-reverse;
  justify-content: space-between;
  align-items: center;
  padding: 0 14px;
  height: 45px;
}

.box input {
  background: transparent;
  border: none;
  color: white;
  font-size: 0.9rem;
  text-align: left;
  direction: ltr;
  width: 65%;
  outline: none;
}

.label {
  font-size: 0.9rem;
  font-weight: 400;
}

.amount-box {
  background: #2E7D32;
  border: 1.5px solid rgba(255,255,255,0.95);
  border-radius: 8px;
  margin-bottom: 5px;
  display: flex;
  flex-direction: row-reverse;
  justify-content: space-between;
  align-items: center;
  padding: 0 14px;
  height: 45px;
  position: relative;
}

.amount-box::before {
  content: '';
  position: absolute;
  left: -10px;
  top: 50%;
  transform: translateY(-50%);
  width: 0;
  height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-right: 10px solid #2E7D32;
}

.amount-box input {
  background: transparent;
  border: none;
  color: white;
  font-size: 0.9rem;
  text-align: left;
  direction: ltr;
  width: 65%;
  outline: none;
}

.btn {
  background: linear-gradient(to bottom, #9CCC65 0%, #66BB6A 100%);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 6px;
  color: white;
  padding: 11px 0;
  font-size: 0.95rem;
  font-weight: 600;
  width: 140px;
  margin: 22px auto;
  display: block;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.12);
}

.footer-actions {
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  font-size: 0.85rem;
  border-top: 1.5px solid rgba(255,255,255,0.7);
  border-bottom: 1.5px solid rgba(255,255,255,0.7);
}

.footer-actions span {
  display: flex;
  align-items: center;
  gap: 5px;
}

.footer-bottom {
  padding: 7px 0;
  font-size: 0.72rem;
  text-align: center;
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="container">
  <div class="check">
    <svg viewBox="0 0 24 24">
      <path d="M5 12l5 5L20 7"></path>
    </svg>
  </div>
  
  <h2>تحويلات</h2>
  
  <div class="box">
    <span class="label">رقم العملية</span>
    <input type="text" value="20004937897">
  </div>
  
  <div class="box">
    <span class="label">التاريخ و الزمن</span>
    <input type="text" value="11-Aug-2024 17:29:28">
  </div>
  
  <div class="box">
    <span class="label">من حساب</span>
    <input type="text" value="0683 0172 8665 0001">
  </div>
  
  <div class="box">
    <span class="label">الى حساب</span>
    <input type="text" value="0293 1168 3274 0001">
  </div>
  
  <div class="box">
    <span class="label">اسم المرسل اليه</span>
    <input type="text" value="ياسر عبدالرحمن عبدالله ادريس">
  </div>
  
  <div class="box">
    <span class="label">رقم الموبايل</span>
    <input type="text" value="N/A">
  </div>
  
  <div class="box">
    <span class="label">التعليق</span>
    <input type="text" value="N/A">
  </div>
  
  <div class="amount-box">
    <span class="label">المبلغ</span>
    <input type="text" value="28,000.00">
  </div>
  
  <button class="btn">موافق</button>
</div>

<div class="footer">
  <div class="footer-actions">
    <span>🔗 مشاركة</span>
    <span>🖨️ طباعة</span>
    <span>⬇️ تحميل</span>
  </div>
  <div class="footer-bottom">
    © 2024 بنك الخرطوم/بنكك حساب
  </div>
</div>
</body>
</html>
