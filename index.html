<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
  
    * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Cairo', sans-serif;
  }
  
  body {
    background: linear-gradient(180deg, #5cb85c 0%, #4caf50 100%);
    min-height: 100vh;
    color: white;
    text-align: center;
    padding: 20px 15px 80px;
  }
  
  .check {
    width: 100px;
    height: 100px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px auto 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  }
  
  .check svg {
    width: 55px;
    height: 55px;
    stroke: #4caf50;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  
  h2 {
    font-size: 1.6rem;
    margin-bottom: 20px;
    font-weight: 600;
  }
  
  .container {
    max-width: 500px;
    margin: 0 auto;
  }
  
  .box {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    height: 50px;
  }
  
  .label {
    font-weight: 600;
    font-size: 0.95rem;
    text-align: right;
    min-width: 110px;
  }
  
  .value-input {
    background: transparent;
    border: none;
    color: white;
    font-size: 0.95rem;
    text-align: left;
    direction: ltr;
    width: 60%;
    outline: none;
  }
  
  .value-input::placeholder {
    color: rgba(255,255,255,0.7);
  }
  
  .btn {
    background: #4caf50;
    border: 2px solid white;
    border-radius: 12px;
    color: white;
    padding: 12px 60px;
    font-size: 1.1rem;
    font-weight: 700;
    margin: 25px auto;
    display: inline-block;
    cursor: pointer;
  }
  
  .btn:active {
    transform: scale(0.96);
  }
  
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.1);
    border-top: 1px solid rgba(255,255,255,0.3);
  }
  
  .footer-top {
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.3);
  }
  
  .footer-bottom {
    padding: 8px 0;
    font-size: 0.75rem;
    opacity: 0.9;
  }
</style>
</head>
<body>

  <div class="container">
    <div class="check">
      <svg viewBox="0 0 24 24">
        <path d="M5 12l5 5L20 7"></path>
      </svg>
    </div>

    <h2>تحويلات</h2>

    <div class="box">
      <input type="text" class="value-input" placeholder="اكتب هنا">
      <span class="label">رقم العملية</span>
    </div>

    <div class="box">
      <input type="text" class="value-input" placeholder="اكتب هنا">
      <span class="label">التاريخ و الزمن</span>
    </div>

    <div class="box">
      <input type="text" class="value-input" placeholder="اكتب هنا">
      <span class="label">من حساب</span>
    </div>

    <div class="box">
      <input type="text" class="value-input" placeholder="اكتب هنا">
      <span class="label">الى حساب</span>
    </div>

    <div class="box">
      <input type="text" class="value-input" placeholder="اكتب هنا">
      <span class="label">إسم المرسل اليه</span>
    </div>

    <div class="box">
      <input type="text" class="value-input" placeholder="اكتب هنا">
      <span class="label">رقم الموبايل</span>
    </div>

    <div class="box">
      <input type="text" class="value-input" placeholder="اكتب هنا">
      <span class="label">التعليق</span>
    </div>

    <div class="box">
      <input type="text" class="value-input" placeholder="اكتب هنا">
      <span class="label">المبلغ</span>
    </div>

    <div class="btn">موافق</div>
  </div>

  <div class="footer">
    <div class="footer-top">
      <div>مشاركة</div>
      <div>طباعة</div>
      <div>تحميل</div>
    </div>
    <div class="footer-bottom">
      © 2024 بنك الخرطوم/بنكك حساب
    </div>
  </div>

</body>
</html>
