<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(to bottom, #8BC34A 0%, #4CAF50 100%);
  min-height: 100vh;
  color: white;
  padding: 15px 0 120px;
}

.container {
  max-width: 400px;
  margin: 0 auto;
  padding: 0 12px;
}

.check {
  width: 100px;
  height: 100px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px auto 15px;
}

.check svg {
  width: 60px;
  height: 60px;
  stroke: #4CAF50;
  stroke-width: 4;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

h2 {
  font-size: 1.35rem;
  margin-bottom: 20px;
  font-weight: 500;
  text-align: center;
}

.box {
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.95);
  border-radius: 7px;
  margin-bottom: 5px;
  display: flex;
  flex-direction: row-reverse;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
  height: 43px;
}

.box input {
  background: transparent;
  border: none;
  color: white;
  font-size: 0.88rem;
  text-align: left;
  direction: ltr;
  width: 65%;
  outline: none;
}

.label {
  font-size: 0.88rem;
  font-weight: 400;
}

.amount-box {
  background: #388E3C;
  border: 2px solid rgba(255,255,255,0.95);
  border-radius: 7px;
  margin-bottom: 5px;
  display: flex;
  flex-direction: row-reverse;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
  height: 43px;
  position: relative;
}

.amount-box::before {
  content: '';
  position: absolute;
  left: -9px;
  top: 50%;
  transform: translateY(-50%);
  width: 0;
  height: 0;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  border-right: 9px solid #388E3C;
}

.amount-box input {
  background: transparent;
  border: none;
  color: white;
  font-size: 0.88rem;
  text-align: left;
  direction: ltr;
  width: 65%;
  outline: none;
}

.btn {
  background: linear-gradient(to bottom, #AED581 0%, #7CB342 100%);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 6px;
  color: white;
  padding: 10px 0;
  font-size: 0.95rem;
  font-weight: 600;
  width: 135px;
  margin: 25px auto;
  display: block;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #388E3C;
}

.footer-top {
  display: flex;
  justify-content: space-between;
  padding: 8px 15px;
  font-size: 0.75rem;
}

.footer-bottom {
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  font-size: 0.82rem;
  border-top: 2px solid rgba(255,255,255,0.8);
  border-bottom: 2px solid rgba(255,255,255,0.8);
}

.footer-bottom span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.footer-copy {
  padding: 6px 0;
  font-size: 0.7rem;
  text-align: center;
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="container">
  <div class="check">
    <svg viewBox="0 0 24 24">
      <path d="M5 12l5 5L20 7"></path>
    </svg>
  </div>
  
  <h2>تحويلات</h2>
  
  <div class="box">
    <span class="label">رقم العملية</span>
    <input type="text" value="20021762155">
  </div>
  
  <div class="box">
    <span class="label">التاريخ و الزمن</span>
    <input type="text" value="28-Apr-2026 20:20:46">
  </div>
  
  <div class="box">
    <span class="label">من حساب</span>
    <input type="text" value="1033 1276 6032 0001">
  </div>
  
  <div class="box">
    <span class="label">الى حساب</span>
    <input type="text" value="1003 0958 5811 0001">
  </div>
  
  <div class="box">
    <span class="label">إسم المرسل اليه</span>
    <input type="text" value="يوسف عبد الله عثمان البشير">
  </div>
  
  <div class="box">
    <span class="label">رقم الموبايل</span>
    <input type="text" value="N/A">
  </div>
  
  <div class="box">
    <span class="label">التعليق</span>
    <input type="text" value="💚💙 هديتنا لأخوان الذاكرة">
  </div>
  
  <div class="amount-box">
    <span class="label">المبلغ</span>
    <input type="text" value="50,000.00">
  </div>
  
  <button class="btn">موافق</button>
</div>

<div class="footer">
  <div class="footer-top">
    <div>👤+ إضافة</div>
    <div>تحويل SDG</div>
  </div>
  <div class="footer-bottom">
    <span>🔗 مشاركة</span>
    <span>🖨️ طباعة</span>
    <span>⬇️ تحميل</span>
  </div>
  <div class="footer-copy">
    © 2024 بنك الخرطوم/بنكك حساب
  </div>
</div>
</body>
</html>
