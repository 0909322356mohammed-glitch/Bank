<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { 
  background: linear-gradient(to bottom, #52B743 0%, #297E25 100%); 
  margin: 0; 
  padding: 20px 20px 140px 20px; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  min-height: 100vh; 
  font-family: 'Cairo', sans-serif;
  direction: rtl;
}

.success-circle { 
  width: 90px; 
  height: 90px; 
  background-color: #ffffff; 
  border-radius: 50%; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  margin-bottom: 20px; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
} 

.success-circle i { 
  color: #297E25; 
  font-size: 45px; 
}

h2 {
  color: white;
  font-size: 22px;
  font-weight: 600;
  margin: 0 0 20px 0;
}

.bankak-container { 
  width: 100%; 
  max-width: 360px; 
  border: 1.5px solid rgba(255, 255, 255, 0.4); 
  border-radius: 12px; 
  overflow: hidden; 
  margin-top: 15px;
  background: transparent;
} 

.row { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 12px 15px; 
  border-bottom: 1.5px solid rgba(255, 255, 255, 0.4);
  font-size: 15px;
  line-height: 1.6;
} 

.row:last-child { 
  border-bottom: none; 
} 

.label { 
  color: #ffffff; 
  font-weight: 500;
  flex-shrink: 0;
  width: 40%;
} 

.value-input { 
  color: #ffffff; 
  font-weight: 400;
  text-align: right;
  direction: rtl;
  background: transparent;
  border: none;
  outline: none;
  width: 58%;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
}

.value-input:focus {
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  padding: 2px 4px;
}

.bankak-button { 
  background: linear-gradient(to bottom, #60c43d 0%, #3b9825 100%); 
  border: 1.5px solid #ffffff; 
  border-radius: 12px; 
  color: #ffffff; 
  box-shadow: inset 0px 1px 3px rgba(255,255,255,0.6); 
  padding: 14px 0;
  font-size: 18px;
  font-weight: 700;
  width: 170px;
  margin: 30px auto 0 auto;
  display: block;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
}

.top-actions {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 360px;
  margin: 25px 0 15px 0;
  padding: 0 10px;
}

.action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: none;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
}

.action-btn i {
  font-size: 22px;
}

.sdg-circle {
  width: 28px;
  height: 28px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}

.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.2);
}

.footer-actions {
  display: flex;
  justify-content: space-around;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  padding: 12px 0;
}

.footer button {
  background: transparent;
  border: none;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
}

.footer i {
  font-size: 20px;
}

.footer-copy {
  text-align: center;
  color: white;
  font-size: 13px;
  padding: 10px 0;
  opacity: 0.9;
}
</style>
</head>
<body>

<div class="success-circle">
  <i class="fa-solid fa-check"></i>
</div>

<h2>تحويلات</h2>

<div class="bankak-container">
  <div class="row">
    <span class="label">رقم العملية</span>
    <input type="text" class="value-input" value="20742358886">
  </div>
  
  <div class="row">
    <span class="label">التاريخ و الزمن</span>
    <input type="text" class="value-input" value="25-Apr-2026 15:12:25">
  </div>
  
  <div class="row">
    <span class="label">من حساب</span>
    <input type="text" class="value-input" value="1003 0771 9526 0001">
  </div>
  
  <div class="row">
    <span class="label">الى حساب</span>
    <input type="text" class="value-input" value="0793 0312 1701 0001">
  </div>
  
  <div class="row">
    <span class="label">اسم المرسل اليه</span>
    <input type="text" class="value-input" value="عبد الله حسن عبد الله محمد">
  </div>
  
  <div class="row">
    <span class="label">رقم الموبايل</span>
    <input type="text" class="value-input" value="N/A">
  </div>
  
  <div class="row">
    <span class="label">التعليق</span>
    <input type="text" class="value-input" value="محمد ابراهيم">
  </div>
  
  <div class="row">
    <span class="label">المبلغ</span>
    <input type="text" class="value-input" value="70,000.00">
  </div>
</div>

<button class="bankak-button">موافق</button>

<div class="top-actions">
  <button class="action-btn">
    <div class="sdg-circle">SDG</div>
    <span>تحويل مرة أخرى</span>
  </button>
  
  <button class="action-btn">
    <i class="fa-solid fa-user-plus"></i>
    <span>إضافة مستفيد</span>
  </button>
</div>

<div class="footer">
  <div class="footer-actions">
    <button onclick="window.print()">
      <i class="fa-solid fa-download"></i>
      <span>تحميل</span>
    </button>
    <button onclick="window.print()">
      <i class="fa-solid fa-print"></i>
      <span>طباعة</span>
    </button>
    <button onclick="navigator.share && navigator.share({title: 'إيصال تحويل', text: 'تفاصيل التحويل'})">
      <i class="fa-solid fa-share-nodes"></i>
      <span>مشاركة</span>
    </button>
  </div>
  <div class="footer-copy">
    2024 بنك الخرطوم | بنك حساب
  </div>
</div>

</body>
</html>
