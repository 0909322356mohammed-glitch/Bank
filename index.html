<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Cairo", "Tajawal", Arial, sans-serif;
}

body {
  background: linear-gradient(to bottom, #8BC34A 0%, #689F38 100%);
  min-height: 100vh;
  color: white;
  padding-bottom: 90px;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 16px;
}

/* علامة الصح */
.check {
  width: 100px;
  height: 100px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px auto 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.check svg {
  width: 60px;
  height: 60px;
  stroke: #4CAF50;
  stroke-width: 4;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

h2 {
  font-size: 22px;
  margin-bottom: 20px;
  font-weight: 500;
  text-align: center;
}

/* الصناديق البيضاء */
.box {
  background: rgba(255,255,255,0.25);
  border: 2px solid rgba(255,255,255,0.9);
  border-radius: 6px;
  margin-bottom: 6px;
  display: flex;
  flex-direction: row-reverse;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
  height: 48px;
}

.box input {
  background: transparent;
  border: none;
  color: white;
  font-size: 15px;
  text-align: left;
  direction: ltr;
  width: 60%;
  outline: none;
}

.label {
  font-size: 15px;
  font-weight: 400;
}

/* صندوق المبلغ */
.amount-box {
  background: #2E7D32;
  border: 2px solid rgba(255,255,255,0.9);
  border-radius: 6px;
  margin-bottom: 6px;
  display: flex;
  flex-direction: row-reverse;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
  height: 48px;
  position: relative;
}

.amount-box::before {
  content: '';
  position: absolute;
  left: -12px;
  top: 50%;
  transform: translateY(-50%);
  width: 0;
  height: 0;
  border-top: 12px solid transparent;
  border-bottom: 12px solid transparent;
  border-right: 12px solid #2E7D32;
}

.amount-box input {
  background: transparent;
  border: none;
  color: white;
  font-size: 15px;
  text-align: left;
  direction: ltr;
  width: 60%;
  outline: none;
}

/* زر موافق */
.btn {
  background: linear-gradient(to bottom, #AED581 0%, #81C784 100%);
  border: 2px solid white;
  border-radius: 8px;
  color: #2E7D32;
  padding: 12px 0;
  font-size: 18px;
  font-weight: 700;
  width: 160px;
  margin: 30px auto;
  display: block;
  cursor: pointer;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}

/* الفوتر */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #6B8E23;
}

.footer-actions {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 10px 0;
  font-size: 14px;
  border-top: 2px solid rgba(255,255,255,0.6);
  border-bottom: 2px solid rgba(255,255,255,0.6);
}

.footer-actions span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.footer-bottom {
  padding: 8px 0;
  font-size: 12px;
  text-align: center;
  opacity: 0.95;
}

.footer-icons {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px 0;
  font-size: 24px;
}
</style>
</head>
<body>
<div class="container">
  <div class="footer-icons">
    <div style="text-align:center;">
      <div>👤+</div>
      <div style="font-size:12px;">إضافة</div>
    </div>
    <div style="text-align:center;">
      <div style="border:2px solid white; border-radius:50%; width:30px; height:30px; line-height:26px; margin:auto;">SDG</div>
      <div style="font-size:12px;">تحويل</div>
    </div>
  </div>

  <div class="check">
    <svg viewBox="0 0 24 24">
      <path d="M5 12l5 5L20 7"></path>
    </svg>
  </div>

  <h2>تحويلات</h2>

  <div class="box">
    <span class="label">رقم العملية</span>
    <input type="text" value="20004937897" readonly>
  </div>

  <div class="box">
    <span class="label">التاريخ و الزمن</span>
    <input type="text" value="11-Aug-2024 17:29:28" readonly>
  </div>

  <div class="box">
    <span class="label">من حساب</span>
    <input type="text" value="0683 0172 8665 0001" readonly>
  </div>

  <div class="box">
    <span class="label">الى حساب</span>
    <input type="text" value="0293 1168 3274 0001" readonly>
  </div>

  <div class="box">
    <span class="label">اسم المرسل اليه</span>
    <input type="text" value="ياسر عبدالرحمن عبدالله ادريس" readonly>
  </div>

  <div class="box">
    <span class="label">رقم الموبايل</span>
    <input type="text" value="N/A" readonly>
  </div>

  <div class="box">
    <span class="label">التعليق</span>
    <input type="text" value="N/A" readonly>
  </div>

  <div class="amount-box">
    <span class="label">المبلغ</span>
    <input type="text" value="28,000.00" readonly>
  </div>

  <button class="btn">موافق</button>
</div>

<div class="footer">
  <div class="footer-actions">
    <span>🔗 مشاركة</span>
    <span>🖨️ طباعة</span>
    <span>⬇️ تحميل</span>
  </div>
  <div class="footer-bottom">
    © 2024 بنك الخرطوم/بنكك حساب
  </div>
</div>
</body>
</html>
