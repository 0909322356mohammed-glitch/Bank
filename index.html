<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل - بنك</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
  
    * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Cairo', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    background: linear-gradient(180deg, #6ac75a 0%, #4caf50 100%);
    min-height: 100vh;
    color: white;
    text-align: center;
    padding: 15px 15px 90px;
  }
  
  .check {
    width: 95px;
    height: 95px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 15px auto 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  
  .check svg {
    width: 52px;
    height: 52px;
    stroke: #4caf50;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  
  h2 {
    font-size: 1.5rem;
    margin-bottom: 18px;
    font-weight: 600;
  }
  
  .container {
    max-width: 500px;
    margin: 0 auto;
  }
  
  .box {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.45);
    border-radius: 10px;
    margin-bottom: 7px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 15px;
    font-size: 0.92rem;
    backdrop-filter: blur(5px);
  }
  
  .box .value {
    font-weight: 600;
    direction: ltr;
    text-align: right;
  }
  
  .box .label {
    font-weight: 400;
    opacity: 0.95;
  }
  
  .btn {
    background: rgba(255,255,255,0.25);
    border: 2px solid white;
    border-radius: 12px;
    color: white;
    padding: 12px 50px;
    font-size: 1.05rem;
    font-weight: 600;
    margin: 22px auto;
    display: inline-block;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .btn:active {
    transform: scale(0.96);
    background: rgba(255,255,255,0.35);
  }
  
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(10px);
  }
  
  .footer-top {
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.25);
    font-size: 0.88rem;
  }
  
  .footer-top div {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  
  .footer-bottom {
    padding: 8px 0;
    font-size: 0.75rem;
    opacity: 0.9;
  }
  
  .icon {
    width: 18px;
    height: 18px;
    fill: white;
  }
</style>
</head>
<body>

  <div class="container">
    <div class="check">
      <svg viewBox="0 0 24 24">
        <path d="M5 12l5 5L20 7"></path>
      </svg>
    </div>

    <h2>تحويلات</h2>

    <div class="box">
      <span class="value">20004937897</span>
      <span class="label">رقم العملية</span>
    </div>

    <div class="box">
      <span class="value">11-Aug-2024 17:29:28</span>
      <span class="label">التاريخ و الزمن</span>
    </div>

    <div class="box">
      <span class="value">0683 0172 8665 0001</span>
      <span class="label">من حساب</span>
    </div>

    <div class="box">
      <span class="value">0293 1168 3274 0001</span>
      <span class="label">الى حساب</span>
    </div>

    <div class="box">
      <span class="value">ياسر عبدالرحمن عبدالله ادريس</span>
      <span class="label">إسم المرسل اليه</span>
    </div>

    <div class="box">
      <span class="value">N/A</span>
      <span class="label">رقم الموبايل</span>
    </div>

    <div class="box">
      <span class="value">N/A</span>
      <span class="label">التعليق</span>
    </div>

    <div class="box">
      <span class="value">28,000.00</span>
      <span class="label">المبلغ</span>
    </div>

    <div class="btn" onclick="alert('تم')">موافق</div>
  </div>

  <div class="footer">
    <div class="footer-top">
      <div>
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
        مشاركة
      </div>
      <div>
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
        طباعة
      </div>
      <div>
        <svg class="icon" viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
        تحميل
      </div>
    </div>
    <div class="footer-bottom">
      © 2024 بنك الخرطوم/بنكك حساب
    </div>
  </div>

</body>
</html>
