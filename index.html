<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>إيصال تحويل</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { 
  background: linear-gradient(to bottom, #52B743 0%, #297E25 100%); 
  margin: 0; 
  padding: 20px 20px 80px 20px; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  min-height: 100vh; 
  font-family: 'Cairo', sans-serif;
  direction: rtl;
}

/* دائرة الصح */
.success-circle { 
  width: 90px; 
  height: 90px; 
  background-color: #ffffff; 
  border-radius: 50%; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  margin-bottom: 20px; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
} 

.success-circle i { 
  color: #297E25; 
  font-size: 45px; 
}

h2 {
  color: white;
  font-size: 22px;
  font-weight: 600;
  margin: 0 0 20px 0;
}

/* الجدول */
.bankak-container { 
  width: 100%; 
  max-width: 360px; 
  border: 1.5px solid rgba(255, 255, 255, 0.4); 
  border-radius: 12px; 
  overflow: hidden; 
  margin-top: 15px;
  background: transparent;
} 

.row { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 12px 15px; 
  border-bottom: 1.5px solid rgba(255, 255, 255, 0.4);
  font-size: 15px;
  line-height: 1.6;
} 

.row:last-child { 
  border-bottom: none; 
} 

.label { 
  color: #ffffff; 
  font-weight: 500;
} 

.value { 
  color: #ffffff; 
  font-weight: 400;
  text-align: left;
  direction: ltr;
}

/* زر موافق - عدل فيهو براحتك */
.bankak-button { 
  background: linear-gradient(to bottom, #60c43d 0%, #3b9825 100%); 
  border: 1.5px solid #ffffff; 
  border-radius: 12px; 
  color: #ffffff; 
  box-shadow: inset 0px 1px 3px rgba(255,255,255,0.6); 
  padding: 14px 0;
  font-size: 18px;
  font-weight: 700;
  width: 170px;
  margin: 30px auto 0 auto;
  display: block;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
}

/* الفوتر التحت: مشاركة طباعة تحميل */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.15);
  border-top: 1px solid rgba(255,255,255,0.3);
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
}

.footer button {
  background: transparent;
  border: none;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.footer i {
  font-size: 16px;
}
</style>
</head>
<body>

<div class="success-circle">
  <i class="fa-solid fa-check"></i>
</div>

<h2>تحويلات</h2>

<div class="bankak-container">
  <div class="row">
    <span class="value">20021762155</span>
    <span class="label">رقم العملية</span>
  </div>
  
  <div class="row">
    <span class="value">28-Apr-2026 20:20:46</span>
    <span class="label">التاريخ والزمن</span>
  </div>
  
  <div class="row">
    <span class="value">0683 0172 8665 0001</span>
    <span class="label">من حساب</span>
  </div>
  
  <div class="row">
    <span class="value">0293 1168 3274 0001</span>
    <span class="label">الى حساب</span>
  </div>
  
  <div class="row">
    <span class="value">ياسر عبدالرحمن عبدالله ادريس</span>
    <span class="label">اسم المرسل اليه</span>
  </div>
  
  <div class="row">
    <span class="value">N/A</span>
    <span class="label">رقم الموبايل</span>
  </div>
  
  <div class="row">
    <span class="value">N/A</span>
    <span class="label">التعليق</span>
  </div>
  
  <div class="row">
    <span class="value">28,000.00</span>
    <span class="label">المبلغ</span>
  </div>
</div>

<button class="bankak-button">موافق</button>

<div class="footer">
  <button onclick="navigator.share && navigator.share({title: 'إيصال تحويل', text: 'تفاصيل التحويل'})">
    <i class="fa-solid fa-share-nodes"></i> مشاركة
  </button>
  <button onclick="window.print()">
    <i class="fa-solid fa-print"></i> طباعة
  </button>
  <button onclick="window.scrollTo(0,0); window.print()">
    <i class="fa-solid fa-download"></i> تحميل
  </button>
</div>

</body>
</html>
